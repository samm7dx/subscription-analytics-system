# Optional Render Blueprint — adjust repo URL if using Blueprint deploy
services:
  - type: web
    name: subscription-analytic-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_NAME
        value: subscription_analytics_system
      - key: DB_SSL
        value: true
      - key: FRONTEND_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: 3306
